services:
  db:
    image: postgres:16
    container_name: dino-postgres
    environment:
      POSTGRES_DB: dinopark
      POSTGRES_USER: dinouser
      POSTGRES_PASSWORD: dinopass
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinouser -d dinopark"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dino-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dinopark
      SPRING_DATASOURCE_USERNAME: dinouser
      SPRING_DATASOURCE_PASSWORD: dinopass
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

volumes:
  postgres-data:
