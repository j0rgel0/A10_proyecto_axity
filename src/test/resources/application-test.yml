spring:
  datasource:
    url: jdbc:h2:mem:dinopark;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml

park:
  simulation:
    steps: 3
    min-tourists-per-step: 2
    max-tourists-per-step: 4
  tickets:
    base-price: 80.00
    child-discount: 0.50
  dinosaurs:
    carnivores: 1
    herbivores: 2
  workers:
    rangers: 2
    mechanics: 1
    vendors: 2
  vehicles:
    safari-trucks: 2
    capacity: 8
  energy:
    initial-units: 300
    consumption-per-step: 20
    maintenance-cost: 50.00
  events:
    base-probability: 1.00
